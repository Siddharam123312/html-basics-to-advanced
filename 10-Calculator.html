<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>

    body{
        background-color: white;
justify-self: center;
width: 50vw;
height: 10vh;
    }
    body:hover{
        opacity: 0.7;
      background-image: url("https://media-cdn.tripadvisor.com/media/photo-s/1d/78/63/3a/beautiful-nature-in-srilanka.jpg");
    }
    .control{
        height: 600px;
        width: 70%;
        border: solid 2px white;
        border-radius: 30px;
        background:linear-gradient(
            rgba(15, 16, 16,1),
            rgb(0, 0, 0),
            rgb(13, 13, 12),
            rgb(0, 0, 0)
        ) ;
        
  

    }




    .container{
        padding: 5px;
        margin: 20px;
        justify-self: center;
              

    }

    input{
font-size: 35px;
border-radius:30px ;
border: none;
box-shadow: 0 4px 10px rgb(212, 208, 190);
text-align: end;  
outline: none;
}

    .container2{
        justify-self: center;
        margin: 20px;
        font-size: 50px;
    }
    button{
        height: 70px;
width: 100px;        border-radius: 50px;
        border: none;
        box-shadow: 0 4px  10px rgb(255, 253, 250);
    }
    button:hover{
        /* border: 2px solid red; */
        cursor: pointer;
box-shadow: 0 4px 10px rgba(0, 204, 51, 0.866);    }

.main{
    margin-left: 150px;
    color: rgb(183, 220, 190);
}


</style>
</head>
<body>
    <div class="main" >
        <h1>Calculator</h1>
    </div>
    <div class="control">
    <div class="container">
        <input type="text" rang="0" name="" id="input_text" placeholder="0">

    </div>
      <div class="container2">
            <button onclick="clr()">Cir</button>
            <button onclick="del()">Del</button>
            <button onclick="add('%')">%</button>
            <button onclick="add('/')">/</button>
        
        </div>
        <div class="container2">
         <button onclick="add(7)">7</button>
            <button onclick="add(8)">8</button>
            <button onclick="add(9)">9</button>
            <button onclick="add('*')">*</button>
          
        </div>
        <div class="container2" aria-controls="4" aria-rowspan="2"> <button onclick="add(4)">4</button>
            <button onclick="add(5)">5</button>
            <button onclick="add(6)">6</button>
              <button onclick="add('-')">-</button>
          </div>
            <div class="container2">
            <button onclick="add(1)">1</button>
            <button onclick="add(2)" >2</button>
            <button onclick="add(3)">3</button>
            <button onclick="add('+')">+</button>
           
            </div>
           
            <div class="container2">
             <button onclick="add('.')">.</button>
                <button onclick="add(0)">0</button>
                <button style="width: 215px; height: 60px;" onclick="Addition()">=</button>
   
</div>
<script>

const input = document.querySelector("#input_text");


const add=(number)=>{

input.value+=number ;
}
const Addition= ()=>{
    try{
        input.value=eval(input.value);

    }catch(err){
alert("You entered wrong or invalid input");
    }
}
const clr =()=>{
input.value ="";
}

const del = () => {
input.value="";
}

</script>
</body>
</html>
